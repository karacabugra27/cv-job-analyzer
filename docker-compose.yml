services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cv-job-backend
    env_file: .env
    volumes:
      - hf_cache:/app/.cache/huggingface
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv-job-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  hf_cache:
